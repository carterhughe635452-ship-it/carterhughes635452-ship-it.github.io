<!DOCTYPE html>
<html>
<head>
  <title>Blue & White Troll Tower</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #0a0f1f, #111827);
      color: white;
      padding-top: 80px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #9ca3af;
      margin-bottom: 30px;
    }

    /* LOGO */
    .logo {
      width: 260px;
      border-radius: 12px;
      margin-bottom: 25px;

      animation: float 4s ease-in-out infinite,
                 glow 2.5s infinite alternate;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px #3b82f6); }
      to { filter: drop-shadow(0 0 25px #60a5fa); }
    }

    /* BUTTONS */
    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      color: white;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    .discord {
      background: #5865F2;
    }

    .roblox {
      background: #e11d48;
    }
  </style>
</head>

<body>

  <!-- YOUR LOGO -->
  <img src="logo.png" class="logo">

  <h1>Blue & White Troll Tower</h1>
  <p>Welcome to the official site 😈</p>

  <div class="buttons">
    <a href="https://discord.gg/gQgDtUe6UF" target="_blank" class="btn discord">
      Join Discord
    </a>

    <a href="https://www.roblox.com/games/70738198047390/blue-and-white-troll-tower#!/store" target="_blank" class="btn roblox">
      Play Game
    </a>
  </div>

</body>
</html>
