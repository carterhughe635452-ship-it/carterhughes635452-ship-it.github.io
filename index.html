<!DOCTYPE html>
<html>
<head>
  <title>Blue & White Troll Tower</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 60px;
      margin-top: 100px;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #3b82f6; }
      to { text-shadow: 0 0 30px #60a5fa; }
    }

    .subtitle {
      font-size: 22px;
      color: #94a3b8;
      animation: slide 3s infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(-20px); }
    }

    .button {
      display: inline-block;
      margin: 15px;
      padding: 18px 35px;
      font-size: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .discord {
      background: #5865F2;
      box-shadow: 0 0 20px #5865F2;
    }

    .roblox {
      background: #ef4444;
      box-shadow: 0 0 20px #ef4444;
    }

    .button:hover {
      transform: scale(1.2);
      box-shadow: 0 0 50px white;
    }

    /* FLASH EFFECT */
    .flash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      animation: flashBeat 1.2s infinite;
    }

    @keyframes flashBeat {
      0%, 90%, 100% { opacity: 0; }
      95% { opacity: 0.15; }
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
    }

    button.music {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body onclick="spawnParticles(event)">

<div class="flash"></div>

<h1>Blue & White Troll Tower 👑</h1>
<p class="subtitle">TRILLIUM MODE ⚡</p>

<a class="button roblox" href="https://www.roblox.com/games/70738198047390/blue-and-white-troll-tower#!/store" target="_blank">
  🎮 Play Game
</a>

<a class="button discord" href="https://discord.gg/gQgDtUe6UF" target="_blank">
  💬 Join Discord
</a>

<br>

<button class="music" onclick="playMusic()">🎧 Start Music</button>

<audio id="music">
  <source src="https://www.myinstants.com/media/sounds/trillium.mp3">
</audio>

<script>
function playMusic() {
  document.getElementById("music").play();
}

/* PARTICLE CLICK EFFECT */
function spawnParticles(e) {
  for (let i = 0; i < 15; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";

    let x = (Math.random() - 0.5) * 200;
    let y = (Math.random() - 0.5) * 200;

    document.body.appendChild(p);

    p.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], {
      duration: 800
    });

    setTimeout(() => p.remove(), 800);
  }
}
</script>

</body>
</html>
