<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      color: #cbd5e1;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome to my website 👋</h1>
  <p>I made this from scratch and put it online.</p>
  <button onclick="sayHello()">Click me</button>

  <script>
    function sayHello() {
      alert("Your website works!");
    }
  </script>
</body>
</html>
