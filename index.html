<!DOCTYPE html>
<html>
<head>
  <title>Blue & White Troll Tower</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #020617, #000000);
      color: white;
      text-align: center;
      padding-top: 100px;
      overflow: hidden;
    }

    h1 {
      font-size: 55px;
      text-shadow: 0 0 25px #60a5fa;
    }

    p {
      font-size: 20px;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      margin: 15px;
      padding: 18px 35px;
      font-size: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .discord {
      background: #5865F2;
      box-shadow: 0 0 20px #5865F2;
    }

    .roblox {
      background: #ef4444;
      box-shadow: 0 0 20px #ef4444;
    }

    .button:hover {
      transform: scale(1.15);
      box-shadow: 0 0 40px white;
    }

    /* animated background glow */
    .glow {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(59,130,246,0.1), transparent);
      animation: move 10s linear infinite;
    }

    @keyframes move {
      from { transform: translate(-50%, -50%); }
      to { transform: translate(50%, 50%); }
    }

    button.music {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<h1>Blue & White Troll Tower 👑</h1>
<p>TRILLIUM MODE ⚡</p>

<a class="button roblox" href="https://www.roblox.com/games/70738198047390/blue-and-white-troll-tower#!/store" target="_blank">
  🎮 Play Game
</a>

<a class="button discord" href="https://discord.gg/gQgDtUe6UF" target="_blank">
  💬 Join Discord
</a>

<br>

<button class="music" onclick="playMusic()">🎧 Start Music</button>

<audio id="music">
  <source src="https://www.myinstants.com/media/sounds/trillium.mp3">
</audio>

<script>
function playMusic() {
  document.getElementById("music").play();
}
</script>

</body>
</html>
